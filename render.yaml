# Render Blueprint – backend VINO PRO
# Usa Docker para incluir Tesseract OCR (requerido para el escáner de etiquetas).
# Opcional: en el dashboard puedes crear el servicio a mano o importar este archivo.
services:
  - type: web
    name: vinopro-backend
    runtime: docker
    rootDir: backend_optimized
    dockerfilePath: Dockerfile
    envVars:
      - key: CORS_ORIGINS
        value: "*"
      - key: HOST
        value: "0.0.0.0"

# Render Blueprint – backend VINO PRO
# Opcional: en el dashboard puedes crear el servicio a mano o importar este archivo.
services:
  - type: web
    name: vinopro-backend
    runtime: python
    rootDir: backend_optimized
    buildCommand: pip install -r requirements.txt
    startCommand: python render_start.py
    envVars:
      - key: CORS_ORIGINS
        value: "*"
      - key: HOST
        value: "0.0.0.0"

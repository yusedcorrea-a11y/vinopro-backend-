{% extends "base.html" %}

{% block head %}
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    body.page-mapa main { max-width: 960px; }
    .mapa-container { display: flex; flex-direction: column; gap: 1rem; }
    .mapa-mapa-wrap {
      height: 360px;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--crema-oscuro);
      box-shadow: var(--sombra-tarjeta);
    }
    #mapa-mapa { width: 100%; height: 100%; }
    .mapa-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
    }
    .mapa-controls input { padding: 0.5rem 0.75rem; border-radius: var(--radius-sm); border: 1px solid rgba(107,45,60,0.2); min-width: 200px; }
    .mapa-controls .btn { padding: 0.5rem 1rem; }
    .mapa-estado { padding: 1rem; border-radius: var(--radius-sm); background: var(--burdeos-suave); color: var(--burdeos); font-weight: 500; }
    .mapa-estado.error { background: rgba(180,60,60,0.15); color: var(--burdeos-oscuro); }
    .mapa-lista { display: grid; gap: 0.75rem; }
    .mapa-lugar-card {
      padding: 1rem;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(107,45,60,0.1);
      transition: box-shadow 0.2s;
    }
    .mapa-lugar-card:hover { box-shadow: var(--sombra-md); }
    .mapa-lugar-card h4 { margin: 0 0 0.35rem 0; font-size: 1.05rem; color: var(--burdeos); }
    .mapa-lugar-card .direccion { font-size: 0.9rem; color: var(--texto-suave); margin-bottom: 0.35rem; }
    .mapa-lugar-card .meta { font-size: 0.8rem; color: var(--texto-suave); margin-bottom: 0.5rem; }
    .mapa-lugar-card .acciones { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .mapa-lugar-card .acciones a { font-size: 0.85rem; }
    [data-theme="dark"] .mapa-lugar-card { background: rgba(26,21,18,0.6); border-color: rgba(212,168,75,0.2); }
    [data-theme="dark"] .mapa-lugar-card h4 { color: var(--dorado-claro); }
    .mapa-badge-destacado { font-size: 0.75rem; font-weight: 600; color: var(--burdeos); background: var(--burdeos-suave); padding: 0.15rem 0.5rem; border-radius: 4px; margin-left: 0.35rem; }
    .mapa-marker-user { font-size: 24px; line-height: 1; color: var(--burdeos); text-align: center; }
  </style>
{% endblock %}

{% block content %}
<div class="mapa-container">
  <h1 class="page-title">{{ t('geolocalizacion.titulo') }}</h1>
  <p class="page-subtitle">{{ t('geolocalizacion.subtitulo') }}</p>

  <div class="mapa-controls">
    <button type="button" id="mapa-btn-ubicacion" class="btn btn-dorado">{{ t('geolocalizacion.usar_ubicacion') }}</button>
    <input type="text" id="mapa-input-ciudad" class="mapa-input-ciudad" placeholder="{{ t('geolocalizacion.placeholder_ciudad') }}" autocomplete="off">
    <button type="button" id="mapa-btn-buscar-ciudad" class="btn btn-outline">{{ t('geolocalizacion.buscar_manual') }}</button>
    <select id="mapa-radio" class="mapa-select-radio" title="{{ t('geolocalizacion.radio') }}">
      <option value="1">1 km</option>
      <option value="3">3 km</option>
      <option value="5" selected>5 km</option>
      <option value="10">10 km</option>
    </select>
  </div>

  <div id="mapa-estado" class="mapa-estado" style="display:none;" aria-live="polite"
  data-text-buscando="{{ t('geolocalizacion.buscando') }}"
  data-text-no-resultados="{{ t('geolocalizacion.no_resultados') }}"
  data-text-permiso-denegado="{{ t('geolocalizacion.permiso_denegado') }}"
  data-text-error-red="{{ t('geolocalizacion.error_red') }}"
  data-text-ver-ruta="{{ t('geolocalizacion.ver_ruta') }}"
  data-text-llamar="{{ t('geolocalizacion.llamar') }}"
  data-text-web="{{ t('geolocalizacion.web') }}"
  data-text-distancia="{{ t('geolocalizacion.distancia') }}"
></div>

  <div class="mapa-mapa-wrap">
    <div id="mapa-mapa"></div>
  </div>

  <section class="mapa-destacados-wrap" aria-label="{{ t('comunidad.lugares_recomendados') }}" id="mapa-seccion-destacados">
    <h2 class="section-title">{{ t('comunidad.lugares_recomendados') }}</h2>
    <div id="mapa-destacados" class="mapa-lista"></div>
  </section>

  <section class="mapa-lista-wrap" aria-label="{{ t('geolocalizacion.lista_lugares') }}">
    <h2 class="section-title">{{ t('geolocalizacion.lugares_encontrados') }}</h2>
    <div id="mapa-lista" class="mapa-lista"></div>
  </section>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/geolocalizacion.js"></script>
{% endblock %}
